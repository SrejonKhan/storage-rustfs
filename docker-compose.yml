# RustFS — S3-compatible object storage
# Docs: https://docs.rustfs.com/installation/docker

services:
  rustfs:
    image: rustfs/rustfs:latest
    container_name: rustfs
    restart: unless-stopped
    ports:
      - "9000:9000" # S3 API (for proxy + optional direct access)
      - "9001:9001" # Web console (optional; can be omitted if only API is needed)
    environment:
      # Set in Coolify env vars (or .env / shell). Defaults used if unset.
      - RUSTFS_ACCESS_KEY=${RUSTFS_ACCESS_KEY:?}
      - RUSTFS_SECRET_KEY=${RUSTFS_SECRET_KEY:?}
      - RUSTFS_CONSOLE_ENABLE=${RUSTFS_CONSOLE_ENABLE:?}
      # Host only (matches Host header), e.g. storage.example.com — not a full URL
      - RUSTFS_SERVER_DOMAINS=${RUSTFS_SERVER_DOMAINS:?}
      - RUSTFS_ADDRESS=:9000
    volumes:
      - rustfs-data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'curl -fsS -H "Host: ${RUSTFS_SERVER_DOMAINS}" http://127.0.0.1:9000/health >/dev/null || exit 1',
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

volumes:
  rustfs-data:
    driver: local
