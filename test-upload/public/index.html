<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RustFS S3 Upload Test</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; max-width: 32rem; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.25rem; margin-bottom: 1rem; }
    label { display: block; margin-top: 0.75rem; font-weight: 500; }
    input[type="file"], input[type="text"] { width: 100%; margin-top: 0.25rem; padding: 0.5rem; }
    button { margin-top: 1rem; padding: 0.5rem 1rem; cursor: pointer; background: #111; color: #fff; border: none; border-radius: 4px; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .result { margin-top: 1rem; padding: 0.75rem; background: #f0f0f0; border-radius: 4px; word-break: break-all; }
    .result.error { background: #fee; }
    .result a { color: #06c; }
  </style>
</head>
<body>
  <h1>RustFS S3 upload test</h1>
  <form id="form">
    <label for="file">File</label>
    <input type="file" id="file" name="file" required>
    <label for="key">Object key</label>
    <input type="text" id="key" name="key" placeholder="public-upload/filename.jpg" required>
    <button type="submit" id="btn">Upload</button>
  </form>
  <div id="result"></div>

  <hr style="margin-top: 2rem;">
  <h1>Files in bucket</h1>
  <button id="refreshBtn">Refresh list</button>
  <div id="fileList" style="margin-top: 1rem;"></div>

  <script>
    const form = document.getElementById("form");
    const result = document.getElementById("result");
    const btn = document.getElementById("btn");
    const fileInput = document.getElementById("file");
    const keyInput = document.getElementById("key");
    const fileList = document.getElementById("fileList");
    const refreshBtn = document.getElementById("refreshBtn");

    const PUBLIC_PREFIX = "public-upload";

    function formatObjectKeyFileName(name) {
      return name.replace(/\s+/g, "-").replace(/[^a-zA-Z0-9._-]/g, "") || "file";
    }

    fileInput.addEventListener("change", () => {
      if (!fileInput.files?.[0]) return;
      // Only auto-fill if the key input is empty or looks like a default prefix
      if (!keyInput.value || keyInput.value === PUBLIC_PREFIX + "/") {
        keyInput.value = PUBLIC_PREFIX + "/" + formatObjectKeyFileName(fileInput.files[0].name);
      }
    });

    async function refreshFiles() {
      fileList.textContent = "Loading...";
      try {
        const r = await fetch("/files");
        const data = await r.json();
        if (!r.ok) throw new Error(data.error || "Failed to fetch files");
        
        if (data.files.length === 0) {
          fileList.textContent = "No files found.";
          return;
        }

        fileList.innerHTML = "";
        data.files.forEach(f => {
          const div = document.createElement("div");
          div.className = "result";
          div.style.marginBottom = "0.5rem";
          div.innerHTML = `
            <strong>${f.key}</strong> (${(f.size / 1024).toFixed(1)} KB)<br>
            <a href="${f.url}" target="_blank">View</a> |
            <a href="#" onclick="prepareUpdate('${f.key}'); return false;">Update</a> |
            <a href="#" onclick="deleteFile('${f.key}'); return false;" style="color: red;">Delete</a>
          `;
          fileList.appendChild(div);
        });
      } catch (err) {
        fileList.innerHTML = `<div class="result error">${err.message}</div>`;
      }
    }

    window.prepareUpdate = (key) => {
      keyInput.value = key;
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    window.deleteFile = async (key) => {
      if (!confirm(`Delete ${key}?`)) return;
      try {
        const r = await fetch(`/files/${key}`, { method: "DELETE" });
        if (!r.ok) {
          const data = await r.json();
          throw new Error(data.error || "Delete failed");
        }
        refreshFiles();
      } catch (err) {
        alert(err.message);
      }
    };

    refreshBtn.addEventListener("click", refreshFiles);
    refreshFiles();

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      result.textContent = "";
      result.className = "result";
      btn.disabled = true;

      const fd = new FormData(form);
      try {
        const r = await fetch("/upload", { method: "POST", body: fd });
        const data = await r.json();
        if (!r.ok) {
          result.className = "result error";
          result.textContent = data.error + (data.detail ? ": " + data.detail : "");
          return;
        }
        result.innerHTML = `Success! <a href="${data.url}" target="_blank" rel="noopener">Open file</a>`;
        refreshFiles();
      } catch (err) {
        result.className = "result error";
        result.textContent = "Request failed: " + err.message;
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
